<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Watchface — Preview</title>
  <style>
    /* ---- Page chrome (preview only, not part of the watchface) ---- */
    :root { --accent: #1db954; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #1a1a1a;
      color: #ccc;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 32px 0;
      box-sizing: border-box;
    }
    h1 { font-size: 16px; font-weight: 600; letter-spacing: 1px; color: #888; margin: 0; }
    .note { font-size: 12px; color: #666; max-width: 360px; text-align: center; line-height: 1.5; }

    /* ---- Device bezel: round-rect like a Versa 4 ---- */
    .device {
      width: 336px;
      height: 336px;
      border-radius: 70px;
      background: #000;
      box-shadow: 0 0 0 12px #2a2a2a, 0 18px 40px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    svg { width: 336px; height: 336px; display: block; }

    .controls { display: flex; gap: 10px; align-items: center; font-size: 12px; }
    button {
      background: #2a2a2a; color: #ccc; border: 1px solid #444;
      border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px;
    }
    button:hover { background: #333; }

    /* ---- Watchface styles (mirrors resources/styles.css) ---- */
    .time   { font-weight: 700; font-size: 88px; fill: #ffffff; text-anchor: middle; }
    .date   { font-weight: 400; font-size: 30px; fill: var(--accent); text-anchor: middle; }
    .stat   { font-weight: 700; font-size: 34px; fill: #ffffff; text-anchor: middle; }
    .statLabel { font-weight: 400; font-size: 18px; fill: #888888; text-anchor: middle; }
  </style>
</head>
<body>
  <h1>DJ WATCHFACE — LOCAL PREVIEW</h1>

  <div class="device">
    <!-- Mirrors resources/index.gui (336x336) -->
    <svg viewBox="0 0 336 336" xmlns="http://www.w3.org/2000/svg">
      <rect width="336" height="336" fill="#000000" />

      <!-- Decorative turntable platter -->
      <circle id="platter" cx="168" cy="128" r="120" fill="#111111" />
      <circle cx="168" cy="128" r="118" fill="none" stroke="var(--accent)" stroke-width="2" />
      <!-- spinning marker line on the platter -->
      <g id="platterSpin" transform="translate(168,128)">
        <line x1="0" y1="0" x2="0" y2="-110" stroke="#333" stroke-width="3" />
      </g>
      <circle cx="168" cy="128" r="14" fill="var(--accent)" />

      <!-- Time -->
      <text id="timeLabel" class="time" x="168" y="158">00:00</text>

      <!-- Date -->
      <text id="dateLabel" class="date" x="168" y="200">--- -- ---</text>

      <!-- Stats: heart rate + steps -->
      <text id="hrLabel"    class="stat" x="94"  y="285">--</text>
      <text id="stepsLabel" class="stat" x="242" y="285">0</text>
      <text class="statLabel" x="94"  y="305">BPM</text>
      <text class="statLabel" x="242" y="305">STEPS</text>
    </svg>
  </div>

  <div class="controls">
    <label><input type="checkbox" id="fmt12" /> 12-hour clock</label>
    <button id="themeBtn">Cycle accent color</button>
    <a id="connectBtn" href="/auth/login">
      <button type="button">Connect Google Health</button>
    </a>
  </div>

  <p class="note">
    <span id="dataStatus">Data source: <strong>simulated</strong></span><br />
    Standalone preview of the layout in <code>resources/index.gui</code> +
    <code>resources/styles.css</code>. Connect Google Health (requires the local
    server in <code>server/</code>) to show your real steps &amp; heart rate.
  </p>

  <script>
    // --- Helpers mirroring common/utils.js ---
    const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    const DAYS = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
    const zeroPad = (n) => (n < 10 ? "0" + n : "" + n);
    const formatDate = (d) => `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;

    const timeLabel = document.getElementById("timeLabel");
    const dateLabel = document.getElementById("dateLabel");
    const hrLabel = document.getElementById("hrLabel");
    const stepsLabel = document.getElementById("stepsLabel");
    const fmt12 = document.getElementById("fmt12");
    const platterSpin = document.getElementById("platterSpin");

    // --- Sensor values (simulated until real data arrives) ---
    let steps = 4213;
    let hr = 72;
    let angle = 0;
    let live = false; // true once the Google Health API has supplied real data

    const dataStatus = document.getElementById("dataStatus");
    const connectBtn = document.getElementById("connectBtn");

    function tick() {
      const now = new Date();
      let hours = now.getHours();
      const mins = zeroPad(now.getMinutes());
      if (fmt12.checked) {
        hours = hours % 12 || 12;
      } else {
        hours = zeroPad(hours);
      }
      timeLabel.textContent = `${hours}:${mins}`;
      dateLabel.textContent = formatDate(now);

      if (!live) {
        // drift simulated values when not connected to real data
        steps += Math.floor(Math.random() * 3);
        hr += Math.round((Math.random() - 0.5) * 4);
        hr = Math.max(58, Math.min(120, hr));
      }
      stepsLabel.textContent = (steps ?? 0).toLocaleString();
      hrLabel.textContent = hr ?? "--";

      // spin the platter
      angle = (angle + 6) % 360;
      platterSpin.setAttribute("transform", `translate(168,128) rotate(${angle})`);
    }
    setInterval(tick, 1000);
    tick();

    // --- Real data from the Google Health API via the local server ---
    // Fails silently (stays simulated) when the server isn't running, e.g.
    // when opening preview/index.html directly as a file.
    async function pollHealth() {
      try {
        const resp = await fetch("/api/today");
        if (resp.status === 401) {
          live = false;
          dataStatus.innerHTML = 'Data source: <strong>simulated</strong> (not connected)';
          connectBtn.style.display = "";
          return;
        }
        const data = await resp.json();
        if (data.error) {
          dataStatus.innerHTML =
            'Data source: <strong>simulated</strong> — API error: ' + data.error;
          return;
        }
        if (data.steps != null) steps = data.steps;
        if (data.heartRate != null) hr = data.heartRate;
        live = true;
        connectBtn.style.display = "none";
        dataStatus.innerHTML =
          'Data source: <strong style="color:var(--accent)">Google Health (live)</strong> · ' +
          data.date;
      } catch {
        // No server (opened as a static file) — keep simulating, hide connect.
        connectBtn.style.display = "none";
        dataStatus.innerHTML =
          'Data source: <strong>simulated</strong> (no server — run <code>server/</code> for live data)';
      }
    }
    pollHealth();
    setInterval(pollHealth, 30000); // refresh every 30s

    // --- Theme cycler ---
    const accents = ["#1db954", "#ff3b30", "#0a84ff", "#ff9f0a", "#bf5af2"];
    let ai = 0;
    document.getElementById("themeBtn").onclick = () => {
      ai = (ai + 1) % accents.length;
      document.documentElement.style.setProperty("--accent", accents[ai]);
    };
  </script>
</body>
</html>
